<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}My Company{% endblock %}</title>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="/">{{ _('Home') }}</a></li>
                {% if user.is_staff %}
                <li><a href="{% url 'add_project' %}">{{ _('Add Project') }}</a></li>
                <li><a href="{% url 'send_email' %}">{{ _('Send Email') }}</a></li>
                {% endif %}
                <li>
                    <a href="/?lang=en">English</a> | <a href="/?lang=ar">العربية</a>
                </li>
            </ul>
        </nav>
    </header>
    {% block content %}{% endblock %}
    <footer>
        <form action="{% url 'subscribe' %}" method="post">
            {% csrf_token %}
            <input type="email" name="email" placeholder="{{ _('Enter your email') }}" required>
            <button type="submit">{{ _('Subscribe') }}</button>
        </form>
    </footer>
</body>
</html>
